# Secret-shape rules for egress scanning.
# Format and prefixes are modeled on the gitleaks ruleset (MIT-licensed,
# https://github.com/gitleaks/gitleaks). This is a curated starter subset — add
# rules here without touching code. Confirm gitleaks' MIT license before vendoring
# their full corpus; the field shape below (id/description/regex) mirrors theirs.
#
# IMPORTANT: the scanner records rule id + location + a non-reversible fingerprint
# only. The matched VALUE is never written to a rule, a log, or the session.

entropy:
  # Flag high-randomness strings that match no known rule.
  enabled: true
  minLength: 20
  maxLength: 120
  minEntropyBitsPerChar: 3.5   # Shannon entropy over the token
  # Tokens must look like a credential (mixed classes), not prose or a hash blob.
  requireMixedClasses: true

allowlist:
  # Substrings that suppress a match (obvious examples/placeholders).
  # NOTE: values must be quoted strings — an unquoted number like 000000000000
  # parses as 0 and would suppress any secret containing the digit "0".
  - "EXAMPLE"
  - "example.com"
  - "AKIAIOSFODNN7EXAMPLE"       # canonical AWS docs example key
  - "000000000000000000000000"   # obvious all-zero placeholder
  - "xxxxxxxxxxxx"

rules:
  - id: aws-access-key-id
    description: AWS Access Key ID
    regex: '\b(AKIA|ASIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA)[A-Z0-9]{16}\b'
  - id: aws-secret-access-key
    description: AWS Secret Access Key (contextual)
    regex: '(?i)aws_secret_access_key\s*[=:]\s*["'']?([A-Za-z0-9/+]{40})'
    secretGroup: 1   # the value follows the key name; group 1 isolates it
  - id: github-pat
    description: GitHub Personal Access Token
    regex: '\bghp_[A-Za-z0-9]{36}\b'
  - id: github-fine-grained-pat
    description: GitHub fine-grained PAT
    regex: '\bgithub_pat_[A-Za-z0-9_]{82}\b'
  - id: github-oauth
    description: GitHub OAuth / app token
    regex: '\b(gho|ghu|ghs|ghr)_[A-Za-z0-9]{36}\b'
  - id: slack-token
    description: Slack token
    regex: '\bxox[baprs]-[A-Za-z0-9-]{10,48}\b'
  - id: slack-webhook
    description: Slack webhook URL
    regex: 'https://hooks\.slack\.com/services/[A-Za-z0-9+/]{40,}'
  - id: google-api-key
    description: Google API key
    regex: '\bAIza[0-9A-Za-z\-_]{35}\b'
  - id: stripe-secret-key
    description: Stripe secret key
    regex: '\bsk_(live|test)_[0-9a-zA-Z]{24,}\b'
  - id: openai-key
    description: OpenAI API key
    regex: '\bsk-[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}\b'
  - id: anthropic-key
    description: Anthropic API key
    regex: '\bsk-ant-[A-Za-z0-9\-_]{80,}\b'
  - id: private-key-block
    description: PEM private key header
    regex: '-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
  - id: jwt
    description: JSON Web Token
    regex: '\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b'
  - id: generic-connection-string
    description: URL with embedded credentials
    regex: '\b[a-zA-Z][a-zA-Z0-9+.-]*://[^:@/\s]+:[^@/\s]+@[^\s/"'']+'
  - id: generic-api-key-assignment
    description: Assignment of an api key / secret / password / token (quoted)
    regex: '(?i)\b(api[_-]?key|secret|passwd|password|token|access[_-]?token)\b\s*[=:]\s*["'']([^"''\s]{8,})["'']'
    secretGroup: 2   # group 1 = key name, group 2 = the assigned value
  - id: generic-secret-assignment-unquoted
    description: Assignment of an api key / secret / password (unquoted, e.g. .env)
    regex: '(?i)\b(api[_-]?key|secret|passwd|password|access[_-]?token|auth[_-]?token|db[_-]?password)\b\s*[=:]\s*([A-Za-z0-9._+/\-]{12,})'
    secretGroup: 2
